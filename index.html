<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELO — Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f0e8;
  --ink: #1a1208;
  --accent: #ff4d1c;
  --muted: #9a8f80;
  --border: #e0d8cc;
  --warm: #f0e6d3;
  /* Dynamic color vars — updated by JS */
  --dyn1: #f5f0e8;
  --dyn2: #e8e0d0;
}

body {
  background: linear-gradient(135deg, var(--dyn1) 0%, var(--dyn2) 100%);
  color: var(--ink);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 1.2s ease;
}

/* noise overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.5;
}

/* ── LAYOUT ── */
.app {
  display: grid;
  grid-template-columns: 1fr 390px;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  gap: 0 32px;
}

/* ── HEADER ── */
header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 26px 0 18px;
  border-bottom: 2px solid var(--ink);
}
.logo {
  font-size: 28px; font-weight: 800; letter-spacing: -1px;
  display: flex; align-items: center; gap: 10px;
}
.logo-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent);
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

.header-right { display: flex; align-items: center; gap: 16px; }
.track-counter {
  font-family: 'Space Mono', monospace; font-size: 11px;
  color: var(--muted); letter-spacing: 1px;
}
/* Keyboard shortcut hint */
.kb-hint {
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--muted); letter-spacing: 0.5px;
  background: var(--warm); border: 1px solid var(--border);
  padding: 3px 8px; border-radius: 4px; cursor: default;
}

/* ── PLAYER PANEL ── */
.player-panel {
  padding: 28px 0;
  display: flex; flex-direction: column; gap: 22px;
}

/* 1. Dynamic bg + 3. Cover zoom */
.cover-stage {
  position: relative;
  width: 100%; aspect-ratio: 1; max-width: 440px;
  border-radius: 4px; overflow: hidden;
  background: var(--warm);
  border: 2px solid var(--ink);
  box-shadow: 8px 8px 0 var(--ink);
  transition: box-shadow 0.3s;
}
.cover-stage.playing { box-shadow: 8px 8px 0 var(--accent); }

#coverImg {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: opacity 0.35s ease, transform 0.5s ease;
  transform-origin: center;
}
/* 3. Hover zoom */
.cover-stage:hover #coverImg { transform: scale(1.05); }

/* 7. Floating now-playing pill */
.now-pill {
  position: absolute; top: 14px; left: 14px;
  background: var(--ink); color: #fff;
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 5px 10px; border-radius: 2px;
  display: flex; align-items: center; gap: 6px;
  animation: floatPill 3s ease-in-out infinite;
}
@keyframes floatPill {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-4px); }
}
.now-pill .dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
}
.cover-stage.playing .now-pill .dot { animation: blink 0.8s ease-in-out infinite; }

/* Song info */
.song-info { max-width: 440px; }
.song-title {
  font-size: clamp(22px, 3.5vw, 36px); font-weight: 800;
  line-height: 1.05; letter-spacing: -0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.song-sub {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 6px; gap: 10px;
}
.song-artist {
  font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.song-year {
  font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
  background: rgba(255,255,255,0.5); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
}

/* 5. Glowing progress bar */
.progress-section { max-width: 440px; }
.progress-track {
  position: relative; height: 6px; background: var(--border);
  border-radius: 3px; cursor: pointer;
}
.progress-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--accent); border-radius: 3px; width: 0%;
  pointer-events: none; transition: width 0.4s linear;
  box-shadow: 0 0 10px var(--accent), 0 0 4px var(--accent);
}
#progress {
  position: absolute; inset: -8px 0; opacity: 0;
  cursor: pointer; width: 100%; margin: 0;
}
.time-row {
  display: flex; justify-content: space-between; margin-top: 8px;
  font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
}

/* Controls */
.controls-row {
  display: flex; align-items: center; gap: 6px; max-width: 440px;
}
.ctrl {
  background: none; border: 2px solid transparent; cursor: pointer;
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink); transition: all 0.15s; flex-shrink: 0;
}
.ctrl svg { fill: currentColor; }
.ctrl:hover { border-color: var(--ink); background: rgba(255,255,255,0.4); }
.ctrl:active { transform: scale(0.92); }
.ctrl.active { color: var(--accent); border-color: var(--accent); }

/* 2. Animated play button */
.play-ctrl {
  width: 64px; height: 64px; background: var(--ink);
  border: 2px solid var(--ink); border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.1s;
  flex-shrink: 0; margin: 0 6px;
  box-shadow: 4px 4px 0 var(--accent);
  position: relative; overflow: hidden;
}
.play-ctrl svg { fill: #fff; position: relative; z-index: 1; }
.play-ctrl:hover {
  background: var(--accent); border-color: var(--accent);
  box-shadow: 4px 4px 0 var(--ink), 0 0 20px rgba(255,77,28,0.4);
}
.play-ctrl:active {
  transform: translate(2px,2px) scale(0.95);
  box-shadow: 2px 2px 0 var(--ink), 0 0 20px rgba(255,77,28,0.7);
}
/* Ripple */
.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transform: scale(0); animation: rippleAnim 0.5s linear;
  pointer-events: none;
}
@keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

/* Volume */
.vol-row {
  display: flex; align-items: center; gap: 10px; max-width: 440px;
}
.vol-row svg { fill: var(--muted); width: 16px; height: 16px; flex-shrink: 0; }
.vol-slider {
  flex: 1; appearance: none; height: 3px; border-radius: 2px;
  outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--ink) 0%, var(--ink) 70%, var(--border) 70%);
}
.vol-slider::-webkit-slider-thumb {
  appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--ink); border: 2px solid var(--bg);
  box-shadow: 0 0 0 2px var(--ink); transition: transform 0.15s;
}
.vol-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

/* Error box */
#errorBox {
  display: none; background: #fff0ed; border: 2px solid var(--accent);
  color: var(--accent); font-family: 'Space Mono', monospace; font-size: 11px;
  padding: 8px 14px; border-radius: 4px; max-width: 440px;
  box-shadow: 3px 3px 0 var(--accent);
}

/* ── PLAYLIST PANEL ── */
.playlist-panel {
  border-left: 2px solid var(--ink);
  padding: 28px 0 28px 28px;
  display: flex; flex-direction: column; gap: 14px;
  overflow: hidden; min-height: 0;
}

.panel-head {
  display: flex; align-items: baseline; justify-content: space-between;
}
.panel-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.panel-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  fill: var(--muted); width: 14px; height: 14px; pointer-events: none;
}
#searchInput {
  width: 100%; background: rgba(255,255,255,0.6);
  border: 2px solid var(--border); border-radius: 4px;
  padding: 10px 12px 10px 34px;
  font-family: 'Syne', sans-serif; font-size: 13px; color: var(--ink);
  outline: none; transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--ink); }
#searchInput::placeholder { color: var(--muted); }

.filter-tabs { display: flex; gap: 6px; }
.tab {
  background: none; border: 2px solid var(--border); border-radius: 20px;
  padding: 4px 12px; font-family: 'Syne', sans-serif; font-size: 11px;
  font-weight: 700; cursor: pointer; color: var(--muted);
  transition: all 0.15s; letter-spacing: 0.5px;
}
.tab:hover { border-color: var(--ink); color: var(--ink); }
.tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }

/* 8. Recently played section */
.recent-section { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.recent-label {
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  margin-bottom: 6px;
}
.recent-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.recent-chip {
  font-family: 'Space Mono', monospace; font-size: 10px; color: var(--ink);
  background: rgba(255,255,255,0.5); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 10px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap; max-width: 120px;
  overflow: hidden; text-overflow: ellipsis;
}
.recent-chip:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

/* 6. Styled scrollbar */
.playlist-scroll {
  overflow-y: auto; flex: 1; min-height: 0;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
}
.playlist-scroll::-webkit-scrollbar { width: 4px; }
.playlist-scroll::-webkit-scrollbar-track { background: transparent; }
.playlist-scroll::-webkit-scrollbar-thumb {
  background: var(--accent); border-radius: 10px;
}

/* Playlist items — 4. Smooth slide hover */
.pl-item {
  display: grid;
  grid-template-columns: 22px 44px 1fr auto;
  align-items: center; gap: 10px;
  padding: 9px 8px 9px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s, padding-left 0.15s, transform 0.2s;
  border-radius: 4px;
}
/* 4. Slide on hover */
.pl-item:hover { background: rgba(255,255,255,0.5); padding-left: 8px; transform: translateX(4px); }
.pl-item.active {
  background: var(--ink); padding-left: 8px;
  border-bottom-color: transparent; border-radius: 6px; margin-bottom: 1px;
  transform: none;
}
.pl-item.active:hover { transform: none; }
.pl-item.active .pl-name { color: #fff; }
.pl-item.active .pl-artist { color: rgba(255,255,255,0.45); }
.pl-item.active .pl-dur { color: rgba(255,255,255,0.45); }
.pl-item.active .pl-num { color: var(--accent); }

.pl-num-wrap { display: flex; align-items: center; justify-content: center; width: 22px; }
.pl-num { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
.eq-bars { display: none; gap: 2px; align-items: flex-end; height: 14px; }
.pl-item.active.is-playing .eq-bars { display: flex; }
.pl-item.active.is-playing .pl-num { display: none; }
.eq-bars span {
  width: 3px; background: var(--accent); border-radius: 1px;
  animation: eqbar 0.5s ease-in-out infinite alternate;
}
.eq-bars span:nth-child(1){height:5px;animation-delay:0s}
.eq-bars span:nth-child(2){height:12px;animation-delay:0.15s}
.eq-bars span:nth-child(3){height:7px;animation-delay:0.3s}
@keyframes eqbar { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }

.pl-thumb {
  width: 44px; height: 44px; border-radius: 4px; object-fit: cover;
  background: var(--warm); border: 1px solid var(--border);
}
.pl-item.active .pl-thumb { border-color: rgba(255,255,255,0.15); }

.pl-info { min-width: 0; }
.pl-name {
  font-size: 12px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--ink); line-height: 1.3;
}
.pl-artist {
  font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
}
.pl-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.pl-dur { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
.pl-fav { font-size: 12px; cursor: pointer; transition: transform 0.15s; line-height: 1; }
.pl-fav:hover { transform: scale(1.3); }
.no-results {
  text-align: center; color: var(--muted);
  font-family: 'Space Mono', monospace; font-size: 12px; padding: 40px 0;
}

/* ── 10. MINI PLAYER ── */
.mini-player {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink); color: #fff;
  display: none; /* shown when scrolled */
  align-items: center; justify-content: space-between;
  padding: 10px 24px; gap: 16px;
  border-top: 2px solid var(--accent);
  z-index: 1000;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.mini-cover {
  width: 38px; height: 38px; border-radius: 4px; object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0;
}
.mini-info { flex: 1; min-width: 0; }
.mini-title {
  font-size: 13px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mini-artist { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.5); }
.mini-controls { display: flex; align-items: center; gap: 8px; }
.mini-btn {
  background: none; border: none; color: #fff; cursor: pointer;
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.mini-btn svg { fill: #fff; }
.mini-btn:hover { background: rgba(255,255,255,0.1); }
.mini-progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; background: var(--accent);
  transition: width 0.4s linear;
}

/* 9. Keyboard shortcut tooltip */
.kb-tooltip {
  position: fixed; bottom: 80px; right: 20px;
  background: var(--ink); color: #fff;
  font-family: 'Space Mono', monospace; font-size: 11px;
  padding: 12px 16px; border-radius: 6px; border: 1px solid var(--accent);
  line-height: 2; z-index: 2000;
  display: none;
  box-shadow: 4px 4px 0 var(--accent);
}
.kb-tooltip.visible { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.kb-tooltip kbd {
  background: rgba(255,255,255,0.1); border-radius: 3px;
  padding: 1px 6px; font-size: 11px; margin-right: 6px;
  border: 1px solid rgba(255,255,255,0.2);
}

/* RESPONSIVE */
@media (max-width: 780px) {
  .app { grid-template-columns: 1fr; padding: 0 16px; }
  header { grid-column: 1; }
  .kb-hint { display: none; }
  .playlist-panel {
    border-left: none; border-top: 2px solid var(--ink);
    padding: 20px 0 80px; max-height: 60vh;
  }
  .cover-stage, .song-info, .progress-section, .controls-row, .vol-row, #errorBox { max-width: 100%; }
}
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo"><div class="logo-dot"></div>MELO</div>
    <div class="header-right">
      <span class="kb-hint" id="kbHintBtn" title="Toggle keyboard shortcuts">⌨ Shortcuts</span>
      <span class="track-counter" id="trackCounter">— tracks</span>
    </div>
  </header>

  <!-- PLAYER -->
  <div class="player-panel">

    <div class="cover-stage" id="coverStage">
      <img id="coverImg" src="" alt="Album Art">
      <div class="now-pill"><span class="dot"></span>NOW PLAYING</div>
    </div>

    <div id="errorBox"></div>

    <div class="song-info">
      <div class="song-title" id="songTitle">Select a track</div>
      <div class="song-sub">
        <span class="song-artist" id="songArtist">—</span>
        <span class="song-year" id="songYear"></span>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
        <input type="range" id="progress" min="0" max="100" value="0">
      </div>
      <div class="time-row">
        <span id="curTime">0:00</span>
        <span id="durTime">0:00</span>
      </div>
    </div>

    <div class="controls-row">
      <button class="ctrl" id="shuffleBtn" title="Shuffle (S)">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M16 3h5v5h-2V6.41l-6.29 6.3-1.42-1.42L17.59 5H16V3zM4 7h6v2H4V7zm0 8h6v2H4v-2zm15 1.59V16h2v5h-5v-2h1.59l-6.3-6.29 1.42-1.42L19 16.59z"/></svg>
      </button>
      <button class="ctrl" id="prevBtn" title="Previous (←)">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-ctrl" id="playBtn" title="Play/Pause (Space)">
        <svg id="iconPlay" width="26" height="26" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" width="26" height="26" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button class="ctrl" id="nextBtn" title="Next (→)">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L15.25 12 8 16.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="ctrl" id="repeatBtn" title="Repeat (R)">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M7 7h10V4l4 4-4 4V9H7V7zm10 10H7v3l-4-4 4-4v3h10v2z"/></svg>
      </button>
    </div>

    <div class="vol-row">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" class="vol-slider" id="volume" min="0" max="1" step="0.01" value="0.7">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg>
    </div>

  </div>

  <!-- PLAYLIST PANEL -->
  <div class="playlist-panel">
    <div class="panel-head">
      <div class="panel-title">Playlist</div>
      <div class="panel-count" id="panelCount">0 tracks</div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="searchInput" placeholder="Search tracks or artists…">
    </div>

    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="fav">❤ Liked</button>
      <button class="tab" data-filter="recent">🕐 Recent</button>
    </div>

    <!-- 8. Recently Played -->
    <div class="recent-section" id="recentSection" style="display:none">
      <div class="recent-label">Recently Played</div>
      <div class="recent-chips" id="recentChips"></div>
    </div>

    <div class="playlist-scroll" id="playlist"></div>
  </div>

</div>

<!-- 10. Mini Player -->
<div class="mini-player" id="miniPlayer">
  <div class="mini-progress" id="miniProgress"></div>
  <img class="mini-cover" id="miniCover" src="" alt="">
  <div class="mini-info">
    <div class="mini-title" id="miniTitle">—</div>
    <div class="mini-artist" id="miniArtist">—</div>
  </div>
  <div class="mini-controls">
    <button class="mini-btn" id="miniPrev">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="mini-btn" id="miniPlay">
      <svg id="miniIconPlay" width="18" height="18" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="miniIconPause" width="18" height="18" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
    </button>
    <button class="mini-btn" id="miniNext">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L15.25 12 8 16.14V9.86zM16 6h2v12h-2z"/></svg>
    </button>
  </div>
</div>

<!-- 9. Keyboard shortcut tooltip -->
<div class="kb-tooltip" id="kbTooltip">
  <div><kbd>Space</kbd> Play / Pause</div>
  <div><kbd>→</kbd> Next song</div>
  <div><kbd>←</kbd> Previous song</div>
  <div><kbd>↑</kbd> Volume up</div>
  <div><kbd>↓</kbd> Volume down</div>
  <div><kbd>S</kbd> Toggle shuffle</div>
  <div><kbd>R</kbd> Toggle repeat</div>
</div>

<audio id="audio"></audio>
<script src="Songs.js"></script>
<script>
// ── STATE ──
let idx = 0, playing = false, shuffle = false, repeat = false;
let simTimer = null, simCur = 0;
let currentFilter = 'all';
const MAX_RECENT = 5;

// ── ELEMENTS ──
const audio        = document.getElementById('audio');
const coverStage   = document.getElementById('coverStage');
const coverImg     = document.getElementById('coverImg');
const songTitle    = document.getElementById('songTitle');
const songArtist   = document.getElementById('songArtist');
const songYear     = document.getElementById('songYear');
const progress     = document.getElementById('progress');
const progressFill = document.getElementById('progressFill');
const curTime      = document.getElementById('curTime');
const durTime      = document.getElementById('durTime');
const volume       = document.getElementById('volume');
const playBtn      = document.getElementById('playBtn');
const iconPlay     = document.getElementById('iconPlay');
const iconPause    = document.getElementById('iconPause');
const playlistEl   = document.getElementById('playlist');
const searchInput  = document.getElementById('searchInput');
const panelCount   = document.getElementById('panelCount');
const trackCounter = document.getElementById('trackCounter');
const errorBox     = document.getElementById('errorBox');
const miniPlayer   = document.getElementById('miniPlayer');
const miniCover    = document.getElementById('miniCover');
const miniTitle    = document.getElementById('miniTitle');
const miniArtist   = document.getElementById('miniArtist');
const miniProgress = document.getElementById('miniProgress');
const miniIconPlay = document.getElementById('miniIconPlay');
const miniIconPause= document.getElementById('miniIconPause');
const recentSection= document.getElementById('recentSection');
const recentChips  = document.getElementById('recentChips');
const kbTooltip    = document.getElementById('kbTooltip');

// ── UTILS ──
function fmtSec(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function durationToSec(str) {
  if (!str) return 0;
  const [m,s] = str.split(':').map(Number);
  return (m||0)*60+(s||0);
}
function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  clearTimeout(errorBox._t);
  errorBox._t = setTimeout(() => errorBox.style.display = 'none', 4000);
}

// ── 1. DYNAMIC BACKGROUND FROM ALBUM COVER ──
const colorCanvas = document.createElement('canvas');
colorCanvas.width = colorCanvas.height = 10;
const colorCtx = colorCanvas.getContext('2d');

function extractColors(imgSrc) {
  const tmpImg = new Image();
  tmpImg.crossOrigin = 'anonymous';
  tmpImg.onload = () => {
    try {
      colorCtx.drawImage(tmpImg, 0, 0, 10, 10);
      const d = colorCtx.getImageData(0, 0, 10, 10).data;
      // average colour from corners for variety
      const r1 = d[0], g1 = d[1], b1 = d[2];
      const r2 = d[d.length-4], g2 = d[d.length-3], b2 = d[d.length-2];
      // lighten for background use
      const lighten = (v) => Math.round(v * 0.25 + 210);
      const c1 = `rgb(${lighten(r1)},${lighten(g1)},${lighten(b1)})`;
      const c2 = `rgb(${lighten(r2)},${lighten(g2)},${lighten(b2)})`;
      document.documentElement.style.setProperty('--dyn1', c1);
      document.documentElement.style.setProperty('--dyn2', c2);
    } catch(e) { /* CORS fail — keep current */ }
  };
  tmpImg.src = imgSrc;
}

// ── AUDIO ERRORS ──
audio.addEventListener('error', () => {
  if (!audio.src || audio.src === window.location.href) return;
  showError('⚠ File not found: ' + decodeURIComponent(audio.src.split('/').pop()));
});

// ── 8. RECENTLY PLAYED ──
function getRecent() {
  try { return JSON.parse(localStorage.getItem('melo_recent') || '[]'); }
  catch { return []; }
}
function addRecent(title) {
  let r = getRecent().filter(t => t !== title);
  r.unshift(title);
  r = r.slice(0, MAX_RECENT);
  localStorage.setItem('melo_recent', JSON.stringify(r));
  renderRecent();
}
function renderRecent() {
  const r = getRecent();
  recentChips.innerHTML = '';
  if (!r.length) return;
  r.forEach(title => {
    const song = songs.find(s => s.title === title);
    if (!song) return;
    const chip = document.createElement('span');
    chip.className = 'recent-chip';
    chip.textContent = title;
    chip.title = title;
    chip.addEventListener('click', () => {
      idx = songs.indexOf(song); load(); startPlay();
    });
    recentChips.appendChild(chip);
  });
}

// ── LOAD ──
function load() {
  const s = songs[idx];
  songTitle.textContent  = s.title;
  songArtist.textContent = s.artist;
  songYear.textContent   = s.year;
  coverImg.style.opacity = '0';
  const img = new Image();
  img.onload = () => {
    coverImg.src = img.src;
    coverImg.style.opacity = '1';
    extractColors(img.src);           // 1. dynamic bg
  };
  img.onerror = () => { coverImg.src = ''; coverImg.style.opacity = '1'; };
  img.src = s.cover || '';
  // mini player cover
  miniCover.src   = s.cover || '';
  miniTitle.textContent  = s.title;
  miniArtist.textContent = s.artist;
  // progress reset
  progress.value = 0;
  progressFill.style.width = '0%';
  miniProgress.style.width = '0%';
  curTime.textContent = '0:00';
  durTime.textContent = s.duration || '0:00';
  simCur = 0; clearInterval(simTimer);
  if (s.src) { audio.src = s.src; audio.load(); }
  else { audio.removeAttribute('src'); showError('⚠ No audio file for: ' + s.title); }
  updateList();
}

// ── SIMULATE (no real file) ──
function simulate() {
  clearInterval(simTimer);
  const total = durationToSec(songs[idx].duration) * 1000;
  if (!total) return;
  simTimer = setInterval(() => {
    simCur += 500;
    if (simCur >= total) { clearInterval(simTimer); autoNext(); return; }
    const pct = (simCur / total) * 100;
    progress.value = pct;
    progressFill.style.width = pct + '%';
    miniProgress.style.width = pct + '%';
    curTime.textContent = fmtSec(simCur / 1000);
  }, 500);
}

// ── PLAY / PAUSE ──
function startPlay() {
  audio.play().then(() => { playing=true; clearInterval(simTimer); })
    .catch(() => { playing=true; simulate(); });
  setPlayingUI(true);
  addRecent(songs[idx].title);        // 8. track recent
}
function stopPlay() {
  audio.pause(); clearInterval(simTimer); playing = false;
  setPlayingUI(false);
}
function setPlayingUI(on) {
  iconPlay.style.display   = on ? 'none'  : 'block';
  iconPause.style.display  = on ? 'block' : 'none';
  miniIconPlay.style.display  = on ? 'none'  : 'block';
  miniIconPause.style.display = on ? 'block' : 'none';
  coverStage.classList.toggle('playing', on);
  document.querySelectorAll('.pl-item').forEach(el => {
    el.classList.toggle('is-playing', on && +el.dataset.idx === idx);
  });
}
function autoNext() {
  if (repeat) { load(); startPlay(); return; }
  idx = shuffle ? Math.floor(Math.random()*songs.length) : (idx+1)%songs.length;
  load(); startPlay();
}

// ── 2. RIPPLE on play button ──
playBtn.addEventListener('click', (e) => {
  // create ripple
  const r = document.createElement('span');
  r.className = 'ripple';
  const size = playBtn.offsetWidth;
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.offsetX - size/2) + 'px';
  r.style.top  = (e.offsetY - size/2) + 'px';
  playBtn.appendChild(r);
  setTimeout(() => r.remove(), 600);
  playing ? stopPlay() : (load(), startPlay());
});

// ── CONTROLS ──
document.getElementById('nextBtn').addEventListener('click', () => {
  idx = shuffle ? Math.floor(Math.random()*songs.length) : (idx+1)%songs.length;
  load(); if(playing) startPlay();
});
document.getElementById('prevBtn').addEventListener('click', () => {
  if (simCur>3000||audio.currentTime>3) { simCur=0; audio.currentTime=0; progressFill.style.width='0%'; return; }
  idx=(idx-1+songs.length)%songs.length; load(); if(playing) startPlay();
});
document.getElementById('shuffleBtn').addEventListener('click', function(){ shuffle=!shuffle; this.classList.toggle('active',shuffle); });
document.getElementById('repeatBtn').addEventListener('click', function(){ repeat=!repeat; this.classList.toggle('active',repeat); });

// Mini player controls
document.getElementById('miniPlay').addEventListener('click', () => playing ? stopPlay() : (load(), startPlay()));
document.getElementById('miniNext').addEventListener('click', () => {
  idx = shuffle ? Math.floor(Math.random()*songs.length) : (idx+1)%songs.length;
  load(); if(playing) startPlay();
});
document.getElementById('miniPrev').addEventListener('click', () => {
  idx=(idx-1+songs.length)%songs.length; load(); if(playing) startPlay();
});

// ── PROGRESS ──
progress.addEventListener('input', () => {
  const pct = +progress.value;
  progressFill.style.width = pct+'%';
  miniProgress.style.width = pct+'%';
  simCur = (pct/100)*durationToSec(songs[idx].duration)*1000;
  curTime.textContent = fmtSec(simCur/1000);
  if (!isNaN(audio.duration)) audio.currentTime = (pct/100)*audio.duration;
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  clearInterval(simTimer);
  const pct = (audio.currentTime/audio.duration)*100;
  progress.value = pct;
  progressFill.style.width  = pct+'%';
  miniProgress.style.width  = pct+'%';
  curTime.textContent = fmtSec(audio.currentTime);
  durTime.textContent = fmtSec(audio.duration);
});
audio.addEventListener('ended', autoNext);

// ── VOLUME ──
volume.addEventListener('input', () => {
  audio.volume = +volume.value;
  const p = (+volume.value*100).toFixed(0);
  volume.style.background = `linear-gradient(to right,var(--ink) 0%,var(--ink) ${p}%,var(--border) ${p}%)`;
});
audio.volume = 0.7;

// ── 10. MINI PLAYER (scroll-triggered) ──
window.addEventListener('scroll', () => {
  const playerBottom = document.querySelector('.player-panel').getBoundingClientRect().bottom;
  miniPlayer.style.display = playerBottom < 0 ? 'flex' : 'none';
}, { passive: true });

// ── LIST ──
function updateList() {
  document.querySelectorAll('.pl-item').forEach(el => {
    const i = +el.dataset.idx;
    el.classList.toggle('active', i===idx);
    el.classList.toggle('is-playing', i===idx&&playing);
  });
  const active = playlistEl.querySelector('.pl-item.active');
  if (active) active.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function buildPlaylist() {
  const q = searchInput.value.toLowerCase().trim();
  let list = [...songs];
  if (currentFilter === 'fav')    list = list.filter(s => localStorage.getItem('fav_'+s.title)==='true');
  if (currentFilter === 'recent') list = getRecent().map(t => songs.find(s=>s.title===t)).filter(Boolean);
  if (q) list = list.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
  playlistEl.innerHTML = '';
  panelCount.textContent = list.length + ' track' + (list.length!==1?'s':'');
  if (!list.length) { playlistEl.innerHTML='<div class="no-results">No tracks found.</div>'; return; }
  list.forEach((song, i) => {
    const ri = songs.indexOf(song);
    const isFav = localStorage.getItem('fav_'+song.title) === 'true';
    const el = document.createElement('div');
    el.className = 'pl-item'+(ri===idx?' active':'')+(ri===idx&&playing?' is-playing':'');
    el.dataset.idx = ri;
    el.innerHTML = `
      <div class="pl-num-wrap">
        <div class="eq-bars"><span></span><span></span><span></span></div>
        <span class="pl-num">${String(i+1).padStart(2,'0')}</span>
      </div>
      <img class="pl-thumb" src="${song.cover}" alt="" loading="lazy">
      <div class="pl-info">
        <div class="pl-name">${song.title}</div>
        <div class="pl-artist">${song.artist}</div>
      </div>
      <div class="pl-right">
        <span class="pl-dur">${song.duration||''}</span>
        <span class="pl-fav" data-idx="${ri}">${isFav?'❤️':'♡'}</span>
      </div>`;
    el.addEventListener('click', e => {
      if (e.target.closest('.pl-fav')) return;
      idx=ri; load(); startPlay();
    });
    el.querySelector('.pl-fav').addEventListener('click', e => {
      e.stopPropagation();
      const key = 'fav_'+song.title;
      const now = localStorage.getItem(key) === 'true';
      localStorage.setItem(key, !now);
      e.target.textContent = !now ? '❤️' : '♡';
    });
    playlistEl.appendChild(el);
  });
  const active = playlistEl.querySelector('.pl-item.active');
  if (active) active.scrollIntoView({block:'nearest',behavior:'smooth'});
}

searchInput.addEventListener('input', buildPlaylist);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    recentSection.style.display = currentFilter === 'recent' ? 'block' : 'none';
    buildPlaylist();
  });
});

// ── 9. KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  // Don't fire when typing in search
  if (e.target === searchInput) return;
  switch(e.code) {
    case 'Space':
      e.preventDefault();
      playing ? stopPlay() : (load(), startPlay());
      break;
    case 'ArrowRight':
      e.preventDefault();
      idx = shuffle ? Math.floor(Math.random()*songs.length) : (idx+1)%songs.length;
      load(); if(playing) startPlay();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      idx=(idx-1+songs.length)%songs.length; load(); if(playing) startPlay();
      break;
    case 'ArrowUp':
      e.preventDefault();
      audio.volume = Math.min(1, audio.volume+0.05);
      volume.value = audio.volume;
      volume.dispatchEvent(new Event('input'));
      break;
    case 'ArrowDown':
      e.preventDefault();
      audio.volume = Math.max(0, audio.volume-0.05);
      volume.value = audio.volume;
      volume.dispatchEvent(new Event('input'));
      break;
    case 'KeyS':
      shuffle = !shuffle;
      document.getElementById('shuffleBtn').classList.toggle('active', shuffle);
      break;
    case 'KeyR':
      repeat = !repeat;
      document.getElementById('repeatBtn').classList.toggle('active', repeat);
      break;
  }
});

// Keyboard shortcut toggle button
document.getElementById('kbHintBtn').addEventListener('click', () => {
  kbTooltip.classList.toggle('visible');
});
document.addEventListener('click', e => {
  if (!e.target.closest('#kbHintBtn') && !e.target.closest('#kbTooltip')) {
    kbTooltip.classList.remove('visible');
  }
});

// ── INIT ──
trackCounter.textContent = songs.length + ' tracks';
renderRecent();
buildPlaylist();
load();
</script>
</body>
</html>
